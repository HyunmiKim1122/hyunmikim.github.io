<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Chamber Music Archive</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22314C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chamber Archive">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#EDF0F5; --navy:#22314C; --navy2:#2A3B59; --card:#FFFFFF;
    --ink:#1F2937; --muted:#6B7280; --soft:#8A94A6; --line:#E4E8EF; --field:#D7DEE8;
    --gold:#B0894A; --burg:#9A3B3B; --green:#3C7A5A; --chip:#F2F5F9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{ background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    padding:14px 0 128px; -webkit-font-smoothing:antialiased; }
  .app{ max-width:480px; margin:0 auto; padding:0 14px; }

  .hero{ background:#0000FF; color:#fff; text-align:center;
    border-radius:16px; padding:22px 20px; margin-bottom:14px; box-shadow:0 3px 10px rgba(0,0,255,.18); }
  .hero h1{ margin:0; font-size:22px; font-weight:700; letter-spacing:-.01em; }
  .hero .brand{ margin:4px 0 0; font-size:14px; font-weight:700; color:#4ADE80; letter-spacing:.01em; }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px; margin-bottom:14px; box-shadow:0 1px 2px rgba(16,24,40,.04); }
  .card-label{ font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:var(--soft); margin:0 0 14px; }

  .field{ display:block; margin-bottom:14px; }
  .field:last-child{ margin-bottom:0; }
  .field > span{ display:block; font-size:13px; font-weight:600; color:#42506A; margin-bottom:6px; }
  select,input[type="text"]{ width:100%; padding:12px 14px; border:1px solid var(--field);
    border-radius:11px; font-size:15px; color:var(--ink); background:#fff; font-family:inherit; }
  select{ appearance:none; -webkit-appearance:none; background-repeat:no-repeat;
    background-position:right 12px center; background-size:16px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236B7280' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    padding-right:38px; }
  input[type="text"]:focus,select:focus{ outline:2px solid var(--navy); outline-offset:1px; }
  input::placeholder{ color:#9AA3B2; }

  .cta{ width:100%; padding:15px; background:#0000FF; color:#fff; border:none;
    border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit;
    box-shadow:0 3px 8px rgba(0,0,255,.20); margin-bottom:9px; }
  .cta:active{ background:#0000cc; }
  .reset{ width:100%; padding:12px; background:#4ADE80; color:#0B3B22;
    border:1px solid #4ADE80; border-radius:12px; font-size:13px; font-weight:700; cursor:pointer;
    font-family:inherit; margin-bottom:14px; }
  .reset:active{ background:#3fc670; border-color:#3fc670; }
  .credit{ text-align:center; font-size:12px; color:var(--muted); margin:12px 0 2px; letter-spacing:.02em; }

  .results-head{ display:flex; justify-content:space-between; align-items:center; padding:2px 4px 10px; }
  .results-head .rc{ font-size:13px; color:var(--muted); }
  .results-head .rc b{ color:var(--navy); font-size:15px; }
  .sort{ width:auto; padding:8px 30px 8px 11px; border-radius:9px; font-size:12.5px; }

  ul#results{ list-style:none; margin:0; padding:0; background:#fff; border:1px solid var(--line);
    border-radius:16px; overflow:hidden; box-shadow:0 1px 2px rgba(16,24,40,.04); }
  li.row{ padding:14px 16px; border-bottom:1px solid #EEF1F5;
    display:grid; grid-template-columns:22px 1fr; gap:11px; align-items:start; }
  li.row:last-child{ border-bottom:none; }
  li.row .pick{ padding-top:2px; }
  li.row .pick input{ width:18px; height:18px; accent-color:var(--navy); cursor:pointer; }
  .title{ font-size:15.5px; font-weight:600; line-height:1.3; margin:0 0 2px; }
  .composer{ font-size:12.5px; color:var(--muted); margin:0 0 8px; }
  .composer .cat{ color:var(--gold); font-weight:600; margin-left:6px; font-variant-numeric:tabular-nums; }
  .tags{ display:flex; flex-wrap:wrap; gap:6px; }
  .tag{ font-size:11px; padding:3px 8px; border-radius:6px; background:var(--chip); color:#5B6472; white-space:nowrap; }
  .tag.era{ background:#F3EEE2; color:var(--gold); }
  .tag.rare{ background:#F6E9E9; color:var(--burg); font-weight:600; }
  .tag.frequent{ background:#E8F1EC; color:var(--green); }
  .tag.occasional{ background:#EEF1F5; color:#5B6472; }
  .tag.dur{ background:#EAEEF5; color:var(--navy); font-weight:600; }
  .tag.lvl1{ background:#E8F1EC; color:var(--green); font-weight:600; }
  .tag.lvl2{ background:#EAEEF5; color:var(--navy); font-weight:600; }
  .tag.lvl3{ background:#F3EEE2; color:var(--gold); font-weight:600; }
  .tag.lvl4{ background:#F6E9E9; color:var(--burg); font-weight:600; }

  .lvl-group{ display:grid; grid-template-columns:repeat(2,1fr); gap:7px; }
  .lvl-btn{ padding:10px 8px; border:1px solid var(--field); border-radius:11px; background:#fff;
    font-family:inherit; font-size:12.5px; font-weight:700; color:#42506A; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1.25; text-align:center; }
  .lvl-btn .sub{ font-size:10px; font-weight:500; color:var(--soft); }
  .lvl-btn.active{ border-color:var(--navy); background:var(--navy); color:#fff; }
  .lvl-btn.active .sub{ color:#C7D0E0; }
  .lvl-btn:active{ opacity:.85; }
  .hist{ margin-top:9px; }
  .hist-toggle{ background:none; border:none; padding:0; cursor:pointer; font-size:11.5px;
    color:var(--muted); display:inline-flex; align-items:center; gap:5px; font-family:inherit; }
  .hist-toggle .arw{ transition:transform .15s; font-size:10px; }
  .hist-toggle.open .arw{ transform:rotate(90deg); }
  .hist-years{ margin-top:7px; display:flex; flex-wrap:wrap; gap:5px; }
  .hist-years span{ font-size:10.5px; color:#42506A; background:#EEF1F5; border-radius:5px;
    padding:2px 6px; font-variant-numeric:tabular-nums; }

  .load-more{ display:block; width:100%; margin:12px 0 0; padding:13px; border-radius:12px;
    border:1px solid var(--field); background:#fff; color:var(--navy); font-family:inherit;
    font-size:13px; font-weight:600; cursor:pointer; }
  .load-more:active{ background:#e8ecf2; }
  .load-more[hidden],[hidden]{ display:none; }

  .empty{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:40px 20px;
    text-align:center; color:var(--muted); font-size:14px; }
  .empty .g{ font-size:34px; color:var(--gold); margin-bottom:8px; }

  .foot{ margin:22px 4px 0; font-size:11px; color:var(--muted); line-height:1.6; }
  .foot .made{ display:block; margin-top:10px; font-size:12.5px; color:#42506A; font-weight:600; letter-spacing:.03em; }

  /* inline youtube link (shown under a selected work) */
  .yt-inline{ margin-top:10px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .yt-btn{ display:inline-flex; align-items:center; gap:7px; text-decoration:none;
    background:#FF0000; color:#fff; font-size:12.5px; font-weight:600; font-family:inherit;
    padding:8px 12px; border-radius:9px; line-height:1; }
  .yt-btn:active{ background:#cc0000; }
  .yt-btn .yt-ic{ width:16px; height:16px; display:inline-block; }
  .yt-inline .yt-hint{ font-size:11px; color:var(--muted); }

  /* selection tray */
  .tray{ position:fixed; left:0; right:0; bottom:0; z-index:40; background:var(--navy); color:#fff;
    box-shadow:0 -5px 18px rgba(16,24,40,.22); transform:translateY(105%); transition:transform .2s ease;
    padding-bottom:env(safe-area-inset-bottom); }
  .tray.show{ transform:translateY(0); }
  .tray .inner{ max-width:480px; margin:0 auto; padding:12px 16px; }
  .tray .summary{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .tray .nums{ font-size:12.5px; line-height:1.55; }
  .tray .nums .big{ font-size:14px; font-weight:700; }
  .tray .nums b{ color:#E7C579; font-weight:700; }
  .tray .acts{ display:flex; gap:8px; flex-shrink:0; }
  .tray button{ font-size:11.5px; border-radius:9px; padding:9px 12px; cursor:pointer; font-family:inherit; font-weight:600; }
  .tray .detbtn{ background:transparent; color:#fff; border:1px solid rgba(255,255,255,.5); }
  .tray .clrbtn{ background:var(--burg); border:1px solid var(--burg); color:#fff; }
  .tray .detail{ margin-top:10px; max-height:34vh; overflow:auto; display:none; }
  .tray.detail-open .detail{ display:block; }
  .tray .detail ul{ list-style:none; margin:0; padding:0; }
  .tray .detail li{ border-top:1px solid rgba(255,255,255,.15); font-size:13px; }
  .tray .detail li:first-child{ border-top:none; }
  .tray .detail a.ytrow{ display:flex; justify-content:space-between; gap:10px; align-items:center;
    padding:9px 0; text-decoration:none; color:inherit; }
  .tray .detail a.ytrow:active{ opacity:.6; }
  .tray .detail .d-info{ display:flex; flex-direction:column; min-width:0; }
  .tray .detail .d-t{ font-weight:600; color:#fff; }
  .tray .detail .d-c{ font-size:11px; color:#B9C2D4; }
  .tray .detail .d-min{ color:#E7C579; font-weight:700; white-space:nowrap; font-variant-numeric:tabular-nums; }
  .tray .detail .play{ color:#FF5A5A; margin-left:5px; font-size:12px; }
  .tray .note{ font-size:10px; color:#AEBAD0; margin-top:9px; }

  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Chamber Music Archive</h1>
      <p class="brand">Hyun Mi Kim</p>
    </header>

    <section class="card">
      <p class="card-label">Filter</p>
      <label class="field"><span>Composer</span><select id="composerSelect"></select></label>
      <label class="field"><span>Era</span><select id="eraSelect"></select></label>
      <label class="field"><span>Ensemble</span><select id="ensSelect"></select></label>
      <label class="field"><span>Frequency</span><select id="freqSelect"></select></label>
      <label class="field"><span>Search</span><input type="text" id="searchBox" placeholder="Title, composer or catalogue (e.g. Op. 115)"></label>
      <div class="field">
        <span>Listening Difficulty</span>
        <div class="lvl-group" id="lvlGroup">
          <button type="button" class="lvl-btn" data-lvl="1">Gateway<span class="sub" id="lvlCount1"></span></button>
          <button type="button" class="lvl-btn" data-lvl="2">Accessible<span class="sub" id="lvlCount2"></span></button>
          <button type="button" class="lvl-btn" data-lvl="3">Challenging<span class="sub" id="lvlCount3"></span></button>
          <button type="button" class="lvl-btn" data-lvl="4">Advanced<span class="sub" id="lvlCount4"></span></button>
        </div>
      </div>
    </section>

    <button class="cta" id="showBtn">Show Results →</button>
    <button class="reset" id="resetBtn">Reset Filters</button>
    <section id="resultsWrap" hidden>
      <div class="results-head">
        <span class="rc"><b id="resultCount">0</b> works</span>
        <select class="sort" id="sortSelect">
          <option value="comp">Composer A–Z</option>
          <option value="freq-desc">Most performed</option>
          <option value="freq-asc">Rarest</option>
          <option value="y0-asc">Earliest premiere</option>
          <option value="y1-desc">Most recent</option>
          <option value="dur-desc">Longest first</option>
        </select>
      </div>
      <ul id="results"></ul>
      <button class="load-more" id="loadMoreBtn" hidden>Show more</button>
    </section>
  </div>

  <div class="tray" id="tray">
    <div class="inner">
      <div class="summary">
        <div class="nums" id="trayNums"></div>
        <div class="acts">
          <button class="detbtn" id="detBtn">Details</button>
          <button class="clrbtn" id="clrBtn">Clear</button>
        </div>
      </div>
      <div class="detail" id="trayDetail"><ul></ul>
        <div class="note">Tap a work to search it on YouTube · ≈ durations are approximate.</div>
      </div>
    </div>
  </div>

const ENS_FORMS=["String Quartet", "Piano Trio", "Piano Quartet", "Piano Quintet", "Quintet", "Quartet", "Trio", "Duo", "Solo", "Sextet", "Septet", "Octet", "Nonet", "Decet", "Sonata", "Concerto", "Symphony", "Serenade / Divertimento", "Song / Lied", "Sacred Vocal", "Winds", "Chamber Ensemble", "Choir / Vocal Ensemble", "Voice & Piano", "Chamber Orchestra", "Mixed Ensemble", "Large Ensemble", "Other"];
const ENS_WITH=["w/ Clarinet", "w/ Flute", "w/ Horn", "w/ Oboe", "w/ Bassoon", "w/ Harp", "w/ Voice", "w/ Guitar", "w/ Saxophone"];
const FREQ_ORDER=['Rare','Occasional','Frequent'];

// counts
const cComp={},cEra={},cEns={},cFreq={};
DATA.forEach(w=>{ cComp[w.c]=(cComp[w.c]||0)+w.n; cEra[w.e]=(cEra[w.e]||0)+1; cFreq[w.fb]=(cFreq[w.fb]||0)+1; w.i.forEach(t=>cEns[t]=(cEns[t]||0)+1); });
const TOP_COMPOSERS=Object.entries(cComp).sort((a,b)=>b[1]-a[1]).slice(0,20).map(x=>x[0]);

const LVL_LABEL={1:'Gateway',2:'Accessible',3:'Challenging',4:'Advanced'};
let state={ composer:'', era:'', ens:'', freq:'', lvl:'', q:'', sort:'comp', limit:50 };
let shown=false;
let selected=new Map();
const expanded=new Set();
const keyOf=w=>w.c+'|'+w.t;

function matchesExcept(w, skip){
  if(skip!=='composer' && state.composer && w.c!==state.composer) return false;
  if(skip!=='era' && state.era && w.e!==state.era) return false;
  if(skip!=='ens' && state.ens && !w.i.includes(state.ens)) return false;
  if(skip!=='freq' && state.freq && w.fb!==state.freq) return false;
  if(skip!=='lvl' && state.lvl && String(w.lvl)!==String(state.lvl)) return false;
  if(state.q){
    const q=state.q.toLowerCase(), qn=q.replace(/[\s.]/g,'');
    const t=w.t.toLowerCase(), c=w.c.toLowerCase(), cat=(w.cat||'').toLowerCase();
    if(!t.includes(q)&&!c.includes(q)&&!cat.includes(qn)&&!t.replace(/[\s.]/g,'').includes(qn)) return false;
  }
  return true;
}
function matches(w){ return matchesExcept(w, null); }
function sortResults(l){
  l=l.slice();
  switch(state.sort){
    case 'freq-desc': l.sort((a,b)=>b.n-a.n||a.c.localeCompare(b.c)); break;
    case 'freq-asc':  l.sort((a,b)=>a.n-b.n||a.c.localeCompare(b.c)); break;
    case 'y0-asc':    l.sort((a,b)=>a.y0-b.y0||a.c.localeCompare(b.c)); break;
    case 'y1-desc':   l.sort((a,b)=>b.y1-a.y1||a.c.localeCompare(b.c)); break;
    case 'dur-desc':  l.sort((a,b)=>b.dur-a.dur||a.c.localeCompare(b.c)); break;
    default:          l.sort((a,b)=>a.c.localeCompare(b.c)||a.t.localeCompare(b.t));
  }
  return l;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// inline YouTube search link shown directly under a selected work
function ytInline(w){
  const yurl='https://www.youtube.com/results?search_query='+encodeURIComponent(w.c+' '+w.t);
  return '<div class="yt-inline">'+
    '<a class="yt-btn" href="'+yurl+'" target="_blank" rel="noopener">'+
      '<svg class="yt-ic" viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.3 31.3 0 0 0 0 12a31.3 31.3 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.3 31.3 0 0 0 24 12a31.3 31.3 0 0 0-.5-5.8zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>'+
      'Search on YouTube'+
    '</a>'+
    '<span class="yt-hint">opens in a new tab</span>'+
  '</div>';
}

function render(){
  const wrap=document.getElementById('resultsWrap');
  if(!shown){ wrap.hidden=true; return; }
  wrap.hidden=false;
  const sorted=sortResults(DATA.filter(matches));
  document.getElementById('resultCount').textContent=sorted.length.toLocaleString();
  const ul=document.getElementById('results'); ul.innerHTML='';
  if(sorted.length===0){
    ul.innerHTML='<li class="empty"><div class="g">♪</div>No works match.<br>Try changing the filters.</li>';
    document.getElementById('loadMoreBtn').hidden=true;
    return;
  }
  const page=sorted.slice(0,state.limit);
  page.forEach(w=>{
    const k=keyOf(w);
    const ens=w.i.map(t=>'<span class="tag">'+(INSTR_LABEL[t]||t)+'</span>').join('');
    const cat=w.cat?'<span class="cat">'+esc(w.cat)+'</span>':'';
    const open=expanded.has(k);
    const li=document.createElement('li'); li.className='row';
    li.innerHTML=
      '<div class="pick"><input type="checkbox" '+(selected.has(k)?'checked':'')+'></div>'+
      '<div class="body">'+
        '<p class="title">'+esc(w.t)+'</p>'+
        '<p class="composer">'+esc(w.c)+cat+'</p>'+
        '<div class="tags">'+
          '<span class="tag era">'+(ERA_LABEL[w.e]||w.e)+'</span>'+ens+
          '<span class="tag '+FREQ_CLASS[w.fb]+'">'+FREQ_LABEL[w.fb]+'</span>'+
          '<span class="tag lvl'+w.lvl+'">'+LVL_LABEL[w.lvl]+'</span>'+
          '<span class="tag dur">≈'+w.dur+' min</span>'+
        '</div>'+
        '<div class="hist">'+
          '<button class="hist-toggle'+(open?' open':'')+'"><span class="arw">▸</span> Performed '+w.n+'× · '+w.y0+'–'+w.y1+'</button>'+
          (open?'<div class="hist-years">'+w.ys.map(y=>'<span>'+y+'</span>').join('')+'</div>':'')+
        '</div>'+
        (selected.has(k)?ytInline(w):'')+
      '</div>';
    li.querySelector('input').addEventListener('change',e=>{ e.target.checked?selected.set(k,w):selected.delete(k); renderTray(); render(); });
    li.querySelector('.hist-toggle').addEventListener('click',()=>{ open?expanded.delete(k):expanded.add(k); render(); });
    ul.appendChild(li);
  });
  document.getElementById('loadMoreBtn').hidden = state.limit>=sorted.length;
}

function renderTray(){
  const tray=document.getElementById('tray');
  const items=[...selected.values()];
  if(!items.length){ tray.classList.remove('show','detail-open'); return; }
  tray.classList.add('show');
  const total=items.reduce((s,w)=>s+w.dur,0), avg=Math.round(total/items.length);
  document.getElementById('trayNums').innerHTML='<span class="big">'+items.length+' selected</span> &nbsp; Total <b>≈'+total+' min</b> &nbsp; Avg <b>≈'+avg+' min</b>';
  const ul=document.querySelector('#trayDetail ul'); ul.innerHTML='';
  items.forEach(w=>{ const li=document.createElement('li');
    const yurl='https://www.youtube.com/results?search_query='+encodeURIComponent(w.c+' '+w.t);
    li.innerHTML='<a class="ytrow" href="'+yurl+'" target="_blank" rel="noopener">'+
      '<span class="d-info"><span class="d-t">'+esc(w.t)+'</span><span class="d-c">'+esc(w.c)+'</span></span>'+
      '<span class="d-min">≈'+w.dur+' min<span class="play">▶</span></span></a>';
    ul.appendChild(li); });
}

// options
function opt(v,label){ const o=document.createElement('option'); o.value=v; o.textContent=label; return o; }
const compSel=document.getElementById('composerSelect');
compSel.appendChild(opt('','All composers'));
TOP_COMPOSERS.forEach(c=>compSel.appendChild(opt(c,c)));
const eraSel=document.getElementById('eraSelect');
const ensSel=document.getElementById('ensSelect');
const freqSel=document.getElementById('freqSelect');

// cross-filtered counts: count option values over all active filters EXCEPT the dropdown's own dimension
function countBy(skip, keyFn){
  const m=new Map();
  DATA.forEach(w=>{ if(!matchesExcept(w,skip)) return;
    const ks=keyFn(w); (Array.isArray(ks)?ks:[ks]).forEach(k=>m.set(k,(m.get(k)||0)+1)); });
  return m;
}
function fillSelect(sel, order, labelMap, cmap, curKey, allLabel){
  sel.innerHTML=''; sel.appendChild(opt('', allLabel));
  order.forEach(k=>{ const n=cmap.get(k)||0; if(!n) return; sel.appendChild(opt(k, labelMap[k]+' ('+n+')')); });
  if(state[curKey] && cmap.get(state[curKey])) sel.value=state[curKey];
  else { sel.value=''; state[curKey]=''; }
}
function fillEnsSelect(cmap){
  ensSel.innerHTML=''; ensSel.appendChild(opt('','All ensembles'));
  const g1=document.createElement('optgroup'); g1.label='Ensemble';
  ENS_FORMS.forEach(e=>{ const n=cmap.get(e)||0; if(n) g1.appendChild(opt(e,INSTR_LABEL[e]+' ('+n+')')); });
  if(g1.children.length) ensSel.appendChild(g1);
  const g2=document.createElement('optgroup'); g2.label='Includes instrument';
  ENS_WITH.forEach(e=>{ const n=cmap.get(e)||0; if(n) g2.appendChild(opt(e,INSTR_LABEL[e]+' ('+n+')')); });
  if(g2.children.length) ensSel.appendChild(g2);
  if(state.ens && cmap.get(state.ens)) ensSel.value=state.ens;
  else { ensSel.value=''; state.ens=''; }
}
function refreshDropdowns(){
  fillSelect(eraSel, ERA_ORDER, ERA_LABEL, countBy('era', w=>w.e), 'era', 'All eras');
  fillEnsSelect(countBy('ens', w=>w.i));
  fillSelect(freqSel, FREQ_ORDER, FREQ_LABEL, countBy('freq', w=>w.fb), 'freq', 'All');
  refreshLvlButtons(countBy('lvl', w=>w.lvl));
}
function refreshLvlButtons(cmap){
  document.querySelectorAll('.lvl-btn').forEach(btn=>{
    const k=btn.dataset.lvl;
    const n=cmap.get(Number(k))||0;
    btn.querySelector('.sub').textContent=n.toLocaleString();
    btn.classList.toggle('active', String(state.lvl)===k);
    btn.disabled=(n===0 && String(state.lvl)!==k);
    btn.style.opacity=btn.disabled?'.4':'';
  });
}

// URL
function writeHash(){ try{ const p=new URLSearchParams();
  if(state.composer)p.set('c',state.composer); if(state.era)p.set('era',state.era);
  if(state.ens)p.set('ens',state.ens); if(state.freq)p.set('freq',state.freq);
  if(state.lvl)p.set('lvl',state.lvl);
  if(state.q)p.set('q',state.q); if(state.sort!=='comp')p.set('sort',state.sort);
  const s=p.toString(); history.replaceState(null,'',s?'#'+s:location.pathname+location.search);
  }catch(e){ /* sandboxed preview blocks replaceState; ignored */ }
}
function readHash(){ const h=location.hash.replace(/^#/,''); if(!h)return false;
  const p=new URLSearchParams(h);
  state.composer=p.get('c')||''; state.era=p.get('era')||''; state.ens=p.get('ens')||'';
  state.freq=p.get('freq')||''; state.lvl=p.get('lvl')||''; state.q=p.get('q')||''; state.sort=p.get('sort')||'comp';
  return [...p.keys()].length>0;
}

// wire
compSel.addEventListener('change',e=>{ state.composer=e.target.value; state.limit=50; refreshDropdowns(); writeHash(); render(); });
eraSel.addEventListener('change',e=>{ state.era=e.target.value; state.limit=50; refreshDropdowns(); writeHash(); render(); });
ensSel.addEventListener('change',e=>{ state.ens=e.target.value; state.limit=50; refreshDropdowns(); writeHash(); render(); });
freqSel.addEventListener('change',e=>{ state.freq=e.target.value; state.limit=50; refreshDropdowns(); writeHash(); render(); });
document.getElementById('lvlGroup').addEventListener('click',e=>{
  const btn=e.target.closest('.lvl-btn'); if(!btn || btn.disabled) return;
  const k=btn.dataset.lvl;
  state.lvl=(String(state.lvl)===k)?'':k;
  state.limit=50; refreshDropdowns(); writeHash(); render();
});
document.getElementById('searchBox').addEventListener('input',e=>{ state.q=e.target.value; state.limit=50; refreshDropdowns(); writeHash(); render(); });
document.getElementById('sortSelect').addEventListener('change',e=>{ state.sort=e.target.value; writeHash(); render(); });
document.getElementById('loadMoreBtn').addEventListener('click',()=>{ state.limit+=50; render(); });
document.getElementById('showBtn').addEventListener('click',()=>{ shown=true; state.limit=50; writeHash(); render();
  document.getElementById('resultsWrap').scrollIntoView({behavior:'smooth',block:'start'}); });
document.getElementById('resetBtn').addEventListener('click',()=>{
  state={ composer:'',era:'',ens:'',freq:'',lvl:'',q:'',sort:'comp',limit:50 }; shown=false;
  compSel.value='';
  document.getElementById('searchBox').value=''; document.getElementById('sortSelect').value='comp';
  refreshDropdowns(); writeHash(); render(); window.scrollTo({top:0,behavior:'smooth'});
});
document.getElementById('detBtn').addEventListener('click',()=>document.getElementById('tray').classList.toggle('detail-open'));
document.getElementById('clrBtn').addEventListener('click',()=>{ selected.clear(); document.getElementById('tray').classList.remove('detail-open'); renderTray(); render(); });

// init
try{
  if(readHash()){ shown=true; compSel.value=state.composer;
    document.getElementById('searchBox').value=state.q; document.getElementById('sortSelect').value=state.sort; }
}catch(e){ /* ignore hash restore errors */ }
refreshDropdowns();
render(); renderTray();
</script>
</body>
</html>
